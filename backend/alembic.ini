[alembic]
# Path to migration scripts
script_location = alembic

# Jinja2 template directory (optional)
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for generated revision timestamps
# timezone =

# Max length for revision slug
# truncate_slug_length = 40

# Revision numbering
# revision_environment = false

# Source database URL — overridden by env.py which reads from .env
# so this value is only used when running alembic outside of the app.
sqlalchemy.url = mysql+pymysql://scm_user:scm_pass@localhost:3306/supply_chain_db

[post_write_hooks]
# Hooks that run after a new revision file is created.
# hooks = autopep8
# autopep8.type = console_scripts
# autopep8.entrypoint = autopep8
# autopep8.options = -W0 {filename}

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
